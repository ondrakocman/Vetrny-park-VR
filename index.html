<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Větrný park</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif}
    #landing{position:fixed;inset:0;z-index:9999;background:#efeae2;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s}
    #landing.hidden{opacity:0;pointer-events:none}
    #landing .logo{width:min(60vw,420px);margin-bottom:48px}
    #enter-vr-btn{padding:18px 52px;font-size:1.25rem;font-weight:700;color:#fff;border:none;border-radius:60px;background:linear-gradient(135deg,#249e6b,#cedc00);cursor:pointer;box-shadow:0 6px 24px rgba(36,158,107,.35);transition:transform .15s,box-shadow .15s;text-transform:uppercase;letter-spacing:.05em}
    #enter-vr-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(36,158,107,.45)}
    #enter-vr-interactive-btn{padding:18px 52px;font-size:1.25rem;font-weight:700;color:#fff;border:none;border-radius:60px;background:linear-gradient(135deg,#3498db,#9b59b6);cursor:pointer;box-shadow:0 6px 24px rgba(52,152,219,.35);transition:transform .15s,box-shadow .15s;text-transform:uppercase;letter-spacing:.05em}
    #enter-vr-interactive-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(52,152,219,.45)}
    .hint{margin-top:24px;color:#888;font-size:.85rem}
    #loading-overlay{position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;color:#fff;font-size:1.4rem}
    #loading-overlay.visible{display:flex}
    .spinner{width:44px;height:44px;border:4px solid rgba(255,255,255,.15);border-top-color:#cedc00;border-radius:50%;animation:spin .7s linear infinite;margin-right:14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .a-enter-vr{display:none!important}
  </style>
</head>
<body>
<div id="landing">
  <img class="logo" src="assets/noho-logo.svg" alt="Logo" onerror="this.style.display='none'">
  <div style="display:flex;gap:16px;flex-wrap:wrap;justify-content:center">
    <button id="enter-vr-btn">Vstoupit do VR</button>
    <button id="enter-vr-interactive-btn">Interaktivní mód</button>
  </div>
  <p class="hint">Nasaďte Meta Quest 3 a klikněte na tlačítko</p>
</div>
<div id="loading-overlay"><div class="spinner"></div><span>Načítání…</span></div>

<!-- Interactive Turbine Control Overlay -->
<div id="turbine-menu" style="position:fixed;top:20px;right:20px;z-index:10000;display:none;padding:16px;background:#efeae2;border-radius:12px;color:#333;min-width:280px;box-shadow:0 8px 32px rgba(0,0,0,0.3);border:2px solid #249e6b">
  <h3 style="margin:0 0 12px 0;font-size:1.1rem;text-align:center;color:#249e6b">Ovládání turbín</h3>
  <div id="turbine-list" style="display:flex;flex-direction:column;gap:8px">
    <!-- Turbine controls will be added here dynamically -->
  </div>
  <div style="margin-top:12px;display:flex;gap:8px">
    <button id="toggle-spheres" style="flex:1;padding:8px;background:#249e6b;border:none;border-radius:6px;color:white;cursor:pointer;font-size:0.9rem">Zobrazit sféry</button>
    <button id="close-menu" style="flex:1;padding:8px;background:#cedc00;border:none;border-radius:6px;color:white;cursor:pointer;font-size:0.9rem">Zavřít</button>
  </div>
</div>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<a-scene vr-mode-ui="enabled:false" renderer="colorManagement:true;sortObjects:true;antialias:true" loading-screen="enabled:false" webxr="requiredFeatures:local-floor">
  <a-assets timeout="90000">
    <video id="vid" src="assets/video.mp4" crossorigin="anonymous" playsinline loop muted preload="auto"></video>
  </a-assets>
  <a-sky id="sky" visible="false" material="shader:flat;src:#vid;side:back"></a-sky>
  <a-entity id="rig" position="0 1.6 0">
    <a-camera look-controls="pointerLockEnabled:false" wasd-controls="enabled:true;acceleration:20"></a-camera>
  </a-entity>
  <a-entity id="audio-sources"></a-entity>
</a-scene>

<script>
(function(){
  'use strict';
  var AUDIO_CONFIG = [
  {
    "name": "Turbine 1",
    "audio": "assets/audio/500m.wav",
    "position": {
      "x": -0.445,
      "y": 5.935,
      "z": -29.404
    },
    "distance": 680,
    "recordingFile": "500m.wav",
    "recordingDistance": 500,
    "volume": 0.735,
    "loop": true
  },
  {
    "name": "Turbine 2",
    "audio": "assets/audio/1km.wav",
    "position": {
      "x": 14.971,
      "y": 5.054,
      "z": -25.502
    },
    "distance": 1290,
    "recordingFile": "1km.wav",
    "recordingDistance": 1000,
    "volume": 0.775,
    "loop": true
  },
  {
    "name": "Turbine 3",
    "audio": "assets/audio/500m.wav",
    "position": {
      "x": 24.993,
      "y": 7.391,
      "z": -14.858
    },
    "distance": 500,
    "recordingFile": "500m.wav",
    "recordingDistance": 500,
    "volume": 1,
    "loop": true
  },
  {
    "name": "Turbine 4",
    "audio": "assets/audio/2km.wav",
    "position": {
      "x": 24.757,
      "y": 3.724,
      "z": -16.53
    },
    "distance": 2220,
    "recordingFile": "2km.wav",
    "recordingDistance": 2000,
    "volume": 0.901,
    "loop": true
  },
  {
    "name": "Turbine 5",
    "audio": "assets/audio/2km.wav",
    "position": {
      "x": 28.798,
      "y": 3.65,
      "z": -7.573
    },
    "distance": 2230,
    "recordingFile": "2km.wav",
    "recordingDistance": 2000,
    "volume": 0.897,
    "loop": true
  }
];

  var landing=document.getElementById('landing');
  var loading=document.getElementById('loading-overlay');
  var scene=document.querySelector('a-scene');
  var sky=document.getElementById('sky');
  var video=document.getElementById('vid');
  var audioContainer=document.getElementById('audio-sources');

  function wait(ms){return new Promise(function(r){setTimeout(r,ms)})}

  var interactiveMode = false;
var turbineStates = {};
var spheresVisible = false;

  function initTurbineStates(){
    AUDIO_CONFIG.forEach(function(src,i){
      turbineStates[i] = {muted: false, element: null};
    });
  }

  function loadAudio(){
    AUDIO_CONFIG.forEach(function(src,i){
      var el=document.createElement('a-entity');
      el.setAttribute('position',src.position);
      el.setAttribute('sound',{
        src:src.audio,
        autoplay:true,loop:src.loop,
        volume:src.volume,
        positional:true,poolSize:1,
        distanceModel:'inverse',
        refDistance:30,maxDistance:300,rolloffFactor:1
      });
      el.id='audio-'+i;
      audioContainer.appendChild(el);
      turbineStates[i].element = el;

      // Interactive mode: add floating label
      if(interactiveMode){
        var label=document.createElement('a-text');
        label.setAttribute('value',src.name+'\\n'+src.distance+'m\\n🔊');
        label.setAttribute('align','center');
        label.setAttribute('position','0 4 0');
        label.setAttribute('scale','4 4 4');
        label.setAttribute('color','#ffffff');
        label.setAttribute('billboard','');
        label.setAttribute('look-at','[camera]');
        label.id='label-'+i;
        el.appendChild(label);
        
        // Optional sphere for debugging
        var sphere=document.createElement('a-sphere');
        sphere.setAttribute('radius','1.5');
        sphere.setAttribute('color',src.recordingFile.includes('500m')?'#2ecc71':src.recordingFile.includes('1km')?'#f1c40f':src.recordingFile.includes('2km')?'#e74c3c':'#3498db');
        sphere.setAttribute('material','opacity:0.7;transparent:true');
        sphere.setAttribute('position','0 0 0');
        sphere.id='sphere-'+i;
        sphere.style.display='none';
        el.appendChild(sphere);
      }
    });
  }

  function updateTurbineLabel(index){
    var label = document.getElementById('label-'+index);
    if(label){
      var state = turbineStates[index];
      var icon = state.muted ? '🔇' : '🔊';
      var src = AUDIO_CONFIG[index];
      label.setAttribute('value',src.name+'\\n'+src.distance+'m\\n'+icon);
    }
  }

  function toggleTurbine(index){
    var state = turbineStates[index];
    state.muted = !state.muted;
    
    if(state.element){
      var sound = state.element.components.sound;
      if(sound){
        if(state.muted){
          sound.pauseSound();
        } else {
          sound.playSound();
        }
      }
    }
    
    updateTurbineLabel(index);
    updateTurbineMenu();
  }

  function createTurbineMenu(){
    var list = document.getElementById('turbine-list');
    list.innerHTML = '';
    
    AUDIO_CONFIG.forEach(function(src,i){
      var state = turbineStates[i];
      var item = document.createElement('div');
      item.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px;background:rgba(36,158,107,0.1);border-radius:6px;border:1px solid rgba(36,158,107,0.3)';
      
      var info = document.createElement('div');
      info.innerHTML = '<div style="font-weight:600;color:#249e6b">'+src.name+'</div><div style="font-size:0.8rem;color:#666">'+src.distance+'m</div>';
      
      var muteBtn = document.createElement('button');
      muteBtn.innerHTML = state.muted ? '🔇' : '🔊';
      muteBtn.style.cssText = 'padding:6px 12px;background:#249e6b;border:none;border-radius:4px;color:white;cursor:pointer;font-size:1rem';
      muteBtn.onclick = function(){toggleTurbine(i)};
      
      item.appendChild(info);
      item.appendChild(muteBtn);
      list.appendChild(item);
    });
  }

  function updateTurbineMenu(){
    AUDIO_CONFIG.forEach(function(src,i){
      var state = turbineStates[i];
      var muteBtn = document.querySelector('#turbine-list div:nth-child('+(i+1)+') button');
      if(muteBtn){
        muteBtn.innerHTML = state.muted ? '🔇' : '🔊';
      }
    });
  }

  function toggleSpheres(){
    spheresVisible = !spheresVisible;
    var toggleBtn = document.getElementById('toggle-spheres');
    
    AUDIO_CONFIG.forEach(function(src,i){
      var sphere = document.getElementById('sphere-'+i);
      if(sphere){
        sphere.setAttribute('visible', spheresVisible);
      }
    });
    
    toggleBtn.innerHTML = spheresVisible ? 'Skrýt sféry' : 'Zobrazit sféry';
  }

  async function enterVR(mode){
    interactiveMode = (mode === 'interactive');
    initTurbineStates();
    
    loading.classList.add('visible');
    if(!scene.hasLoaded) await new Promise(function(r){scene.addEventListener('loaded',r,{once:true})});
    loadAudio();
    
    if(interactiveMode){
      createTurbineMenu();
      document.getElementById('turbine-menu').style.display='block';
    }
    
    try{await scene.enterVR()}catch(e){console.warn('VR fallback:',e)}
    await wait(300);
    try{await video.play()}catch(e){console.warn('Video:',e)}
    await wait(200);
    sky.object3D.visible=true;
    landing.classList.add('hidden');
    loading.classList.remove('visible');
  }

  document.getElementById('enter-vr-btn').addEventListener('click',function(){enterVR('normal')});
  document.getElementById('enter-vr-interactive-btn').addEventListener('click',function(){enterVR('interactive')});
  document.getElementById('close-menu').addEventListener('click',function(){
    document.getElementById('turbine-menu').style.display='none';
  });
  document.getElementById('toggle-spheres').addEventListener('click',toggleSpheres);

  scene.addEventListener('exit-vr',function(){
    sky.object3D.visible=false;
    try{video.pause();video.currentTime=0}catch(e){}
    landing.classList.remove('hidden');
    document.getElementById('turbine-menu').style.display='none';
  });
})();
</script>
</body>
</html>
